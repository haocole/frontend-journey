<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 03 - Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-card">
        <div class="product-img">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="Giày Sneaker">
        </div>
        
        <div class="product-info">
            <span class="category">Giày Thể Thao</span>
            <h2 class="product-title">Nike Air Max Chạy Bộ</h2>
            
            <div class="price-box">
                <span class="current-price">1.500.000đ</span>
                <span class="old-price">2.000.000đ</span>
            </div>
            
            <button class="btn-buy">Buy Now</button>
        </div>
    </div>

</body>
</html>
